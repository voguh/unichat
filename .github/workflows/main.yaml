name: main.yaml

on:
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  TAURI_APP_PATH: ${{ github.workspace }}
  TAURI_FRONTEND_PATH: ${{ github.workspace }}/webapp
  NODE_VERSION: '24.16.0'
  PNPM_VERSION: '10.33.4'
  RUST_VERSION: '1.95.0'
  YQ_VERSION: 'v4.53.2'

jobs:
  check_license_headers:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Check license headers
        run: |
          LOG_LEVEL=debug ./zztools/check-license-header.py

  bundle-webapp:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/stable/') || startsWith(github.ref, 'refs/tags/')
    needs: [check_license_headers]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ${{ env.TAURI_FRONTEND_PATH }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.TAURI_FRONTEND_PATH }}
        run: |
          pnpm install --frozen-lockfile

      - name: Build webapp
        working-directory: ${{ env.TAURI_FRONTEND_PATH }}
        run: |
          pnpm build:ui

      - name: Upload webapp build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: webapp-build
          path: ${{ env.TAURI_FRONTEND_PATH }}/dist

  package:
    runs-on: ${{ matrix.os }}
    needs: [bundle-webapp]
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Download webapp build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: webapp-build
          path: ${{ env.TAURI_FRONTEND_PATH }}/dist

      - name: Rust toolchain setup
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ env.RUST_VERSION }}-

      - name: Cache cargo target
        uses: actions/cache@v5.0.5
        with:
          path: |
            target
          key: cargo-target-${{ matrix.os }}-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ matrix.os }}-${{ env.RUST_VERSION }}-

      - name: Cache cargo bin
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
          key: cargo-bin-${{ matrix.os }}-${{ env.RUST_VERSION }}

      - name: Install linux dependencies
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --no-install-suggests -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils

      - name: Prepare repository
        run: |
          jq '.build.beforeBuildCommand = ""' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
          corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION}} --activate && corepack enable pnpm
          command -v cargo-tauri || cargo install --locked tauri-cli

      - name: Install Webapp production dependencies
        working-directory: ${{ env.TAURI_FRONTEND_PATH }}
        run: pnpm install --frozen-lockfile --prod

      - name: Clean stale artifacts
        run: |
          rm -rf ${{ github.workspace }}/target/release/assets
          rm -rf ${{ github.workspace }}/target/release/bundle
          rm -rf ${{ github.workspace }}/target/release/examples
          rm -rf ${{ github.workspace }}/target/release/icons
          rm -rf ${{ github.workspace }}/target/release/plugins
          rm -rf ${{ github.workspace }}/target/release/widgets
          rm -rf ${{ github.workspace }}/target/release/LICENSE

      - name: Run build app
        run: cargo tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.os }}-bundles
          path: ${{ github.workspace }}/target/release/bundle

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    needs: [package]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Download windows build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: windows-2025-bundles
          path: ${{ github.workspace }}/target/windows

      - name: Download linux build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ubuntu-24.04-bundles
          path: ${{ github.workspace }}/target/linux

      - name: Install yq
        run: |
          case "$(uname -m)" in
            x86_64|amd64)  ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *) echo "Unsupported architecture." && exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          wget "https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_${ARCH}" -O "$HOME/.local/bin/yq"
          chmod +x "$HOME/.local/bin/yq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check version consistency
        run: |
          export CARGO_PACKAGE_VERSION="$(yq -p toml -oy '.package.version' Cargo.toml)"
          TAG_NAME="${{ github.ref_name }}"
          if [ "$CARGO_PACKAGE_VERSION" != "$TAG_NAME" ]; then
            echo "Error: The version in Cargo.toml ($CARGO_PACKAGE_VERSION) does not match the release tag ($TAG_NAME)."
            exit 1
          fi

      - name: Move build artifacts
        run: |
          export VERSION="${{ github.ref_name }}"
          mkdir -p ${{ github.workspace }}/dist
          cp ${{ github.workspace }}/target/linux/appimage/*.AppImage ${{ github.workspace }}/dist/unichat-$VERSION.AppImage
          cp ${{ github.workspace }}/target/linux/deb/*.deb ${{ github.workspace }}/dist/unichat-$VERSION.deb
          cp ${{ github.workspace }}/target/linux/rpm/*.rpm ${{ github.workspace }}/dist/unichat-$VERSION.rpm
          cp ${{ github.workspace }}/target/windows/nsis/*.exe ${{ github.workspace }}/dist/unichat-$VERSION-setup.exe
          for file in ${{ github.workspace }}/dist/*; do
            if [ -f "$file" ]; then
              (cd "$(dirname "$file")" && sha256sum "$(basename "$file")" > "$(basename "$file").sha256")
            fi
          done

      - name: Create and upload Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" ${{ github.workspace }}/dist/* --prerelease;

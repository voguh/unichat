name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

defaults:
  run:
    shell: bash

env:
  YQ_VERSION: v4.53.2

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Check version consistency
        run: |
          export CARGO_PACKAGE_VERSION="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          TAG_NAME="${{ github.ref_name }}"
          if [ "$CARGO_PACKAGE_VERSION" != "$TAG_NAME" ]; then
            echo "Error: The version in Cargo.toml ($CARGO_PACKAGE_VERSION) does not match the release tag ($TAG_NAME)."
            exit 1
          fi

  package:
    needs: [prepare-release]
    uses: ./.github/workflows/package.yaml

  publish:
    runs-on: ubuntu-24.04
    needs: [package]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Download windows build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: windows-bundles
          path: target/windows

      - name: Download linux build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: linux-bundles
          path: target/linux

      - name: Move build artifacts
        run: |
          export VERSION="${{ github.ref_name }}"
          mkdir -p dist
          cp target/linux/appimage/*.AppImage dist/unichat-$VERSION.AppImage
          cp target/linux/deb/*.deb dist/unichat-$VERSION.deb
          cp target/linux/rpm/*.rpm dist/unichat-$VERSION.rpm
          cp target/windows/nsis/*.exe dist/unichat-$VERSION-setup.exe
          cp target/windows/msi/*.msi dist/unichat-$VERSION-setup.msi || echo "No MSI installer found"
          for file in dist/*; do
            if [ -f "$file" ]; then
              (cd "$(dirname "$file")" && sha256sum "$(basename "$file")" > "$(basename "$file").sha256")
            fi
          done

      - name: Create and upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* --prerelease
